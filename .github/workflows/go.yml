name: Go
on: [push]
jobs:

  test:
    name: Build & test
    runs-on: ubuntu-latest

    env:
      GO111MODULE: 'on'
    strategy:
      matrix:
        go:
          - 'stable'
          - 'oldstable'
          - '1.24'
          - '1.23'
          - '1.22'
          - '1.21'
          - '1.20'
          - '1.19'
          - '1.18'
          - '1.17'
          - '1.16'
          - '1.15'
          - '1.14'
          - '1.13'
          - '1.12'

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}
      id: go

    - name: Build
      run: go build
    - name: Test
      run: go test -v ./...

  quality:
    name: Quality reports
    needs: [ test ] 
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        # Default is 1 (shallow clone with a single commit)
        # but SonarQube wants full history
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Test, with coverage, as JSON
      run: go test -json -coverprofile=.coverage.out ./... >.gotest.out

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7
      env:
        # https://sonarcloud.io/project/configuration/GitHubActions?id=dolmen-go_codegen
        # https://github.com/dolmen-go/codegen/settings/secrets/actions
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        # See also sonar-project.properties
        args: >
          -Dsonar.go.tests.reportPaths=.gotest.out
          -Dsonar.go.coverage.reportPaths=.coverage.out

    - name: Upload coverage to Codecov.io
      # https://github.com/codecov/codecov-action
      # https://docs.codecov.com/docs/quick-start
      uses: codecov/codecov-action@v5
      with:
        # https://github.com/codecov/codecov-action/blob/main/README.md#arguments
        disable_search: true
        files: ./.coverage.out
        fail_ci_if_error: true
        report_type: coverage
        disable_telem: true
        # https://app.codecov.io/gh/dolmen-go/codegen/config/general
        # https://github.com/dolmen-go/codegen/settings/secrets/actions
        token: ${{ secrets.CODECOV_TOKEN }}
